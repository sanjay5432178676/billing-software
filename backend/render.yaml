# Render.com Deployment Config
# This file tells Render how to deploy your backend

services:
  - type: web
    name: pos-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pos_database
      - key: CORS_ORIGINS
        value: "*"
